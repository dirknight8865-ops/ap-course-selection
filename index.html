<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#1a1a2e}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:36px 20px;border-radius:12px;margin-bottom:24px;text-align:center}
header h1{font-size:24px;margin-bottom:6px}
header p{color:#a8b2d1;font-size:14px}
.card{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h3{font-size:13px;font-weight:700;color:#4a5568;margin-bottom:12px;border-bottom:1px solid #edf2f7;padding-bottom:8px}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.grp{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
.grp label{font-size:10px;font-weight:600;color:#4a5568;text-transform:uppercase;letter-spacing:.3px}
.grp select,.grp input{padding:7px 10px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px}
.grp select:focus,.grp input:focus{outline:none;border-color:#0f3460}
.grp input[type="range"]{padding:0;border:none;height:5px;-webkit-appearance:none;background:#e2e8f0;border-radius:3px}
.grp input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#0f3460;cursor:pointer}
.grp input[type="range"]:disabled,.grp select:disabled{opacity:.3;cursor:not-allowed}
.rval{font-size:22px;font-weight:700;color:#0f3460;text-align:center;line-height:1}
.rlbl{display:flex;justify-content:space-between;font-size:10px;color:#a0aec0}
.pgrid{display:flex;flex-wrap:wrap;gap:8px}
.pitem{display:flex;align-items:center;gap:5px;padding:5px 10px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:12px;user-select:none}
.pitem:hover{border-color:#bee3f8}
.pitem input[type="checkbox"]{width:14px;height:14px;pointer-events:none}
.pitem.chk{border-color:#0f3460;background:#ebf4ff;font-weight:600}
.btn{padding:8px 28px;background:#0f3460;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#1a1a2e}
.btn2{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #0f3460;color:#0f3460;background:#fff}
.btn2:hover{background:#ebf4ff}
.btn-g{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #48bb78;color:#22543d;background:#fff}
.btn-g:hover{background:#c6f6d5}
.sbar{background:#fff;border-radius:12px;padding:12px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:13px}
.sbar .cnt span{color:#0f3460;font-weight:700}
.sbar .msg{display:none;color:#e53e3e;font-weight:600;font-size:12px}
.leg{display:flex;gap:12px;flex-wrap:wrap}
.legi{display:flex;align-items:center;gap:4px;font-size:11px;color:#4a5568}
.ld{width:9px;height:9px;border-radius:50%}.ld.g{background:#48bb78}.ld.y{background:#ecc94b}.ld.r{background:#fc8181}
table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);background:#fff}
thead{background:#1a1a2e;color:#fff}th{padding:10px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
td{padding:10px 8px;font-size:12px;border-bottom:1px solid #edf2f7}tbody tr:hover{background:#f7fafc}
tbody tr{cursor:pointer}
.gh{background:#edf2f7!important;font-weight:700}.gh td{padding:8px;font-size:13px;border-bottom:2px solid #e2e8f0}
.bdg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-right:6px}
.bdg.sc{background:#bee3f8;color:#2a4365}.bdg.ad{background:#fefcbf;color:#744210}.bdg.ar{background:#fbb6ce;color:#702459}.bdg.ss{background:#e9d8fd;color:#44337a}
.sb{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.sb.g{background:#c6f6d5;color:#22543d}.sb.y{background:#fefcbf;color:#744210}.sb.r{background:#fed7d7;color:#9b2c2c}
.tg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:500}
.tg.g{background:#c6f6d5;color:#22543d}.tg.r{background:#fed7d7;color:#9b2c2c}
.ch{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.ch.g{background:#c6f6d5;color:#22543d}.ch.y{background:#fefcbf;color:#744210}.ch.r{background:#fed7d7;color:#9b2c2c}
.cbox{text-align:center}.cbox input{width:14px;height:14px;cursor:pointer}.cbox input:disabled{cursor:not-allowed;opacity:.25}
.taken-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.taken-row select{flex:1;min-width:120px;padding:6px 8px;border:2px solid #e2e8f0;border-radius:8px;font-size:12px}
.taken-rmv{width:28px;height:28px;border-radius:50%;border:2px solid #fc8181;background:#fff;color:#9b2c2c;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.taken-rmv:hover{background:#fed7d7}
.taken-add{width:32px;height:32px;border-radius:50%;border:2px solid #48bb78;background:#fff;color:#22543d;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.taken-add:hover{background:#c6f6d5;transform:scale(1.1)}
.ctags{display:flex;flex-wrap:wrap;gap:2px}.ctag{font-size:9px;padding:1px 5px;border-radius:3px;background:#edf2f7;color:#4a5568}
.ctag.ok{background:#c6f6d5;color:#22543d;font-weight:600}
.rtag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#fed7d7;color:#9b2c2c;font-weight:600}
.report-box{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-top:20px;white-space:pre-wrap;font-size:13px;line-height:1.8;display:none}
.report-box.show{display:block}
@media(max-width:768px){.container{padding:12px}.card{padding:14px}.row{gap:10px}.grp{min-width:110px}}
@media print{header,.card,.sbar{break-inside:avoid}.report-box.show{box-shadow:none;padding:0}}
</style>
</head>
<body>
<div class="container">
<header><h1>AP 选课推荐系统 — IHP 2026-27</h1><p>根据 IHP 2026-27 官方选课标准智能评估你的 AP 选课资格</p></header>

<div class="card"><h3>基本信息</h3>
<div style="display:flex;flex-wrap:wrap;gap:16px">
<div style="flex:1;min-width:320px">
<div class="grp" style="margin-bottom:6px"><label>学生姓名</label><input type="text" id="stuName" placeholder="输入你的姓名"></div>
<div class="row">
<div class="grp"><label>GPA 类型</label><select id="gpaType"><option value="100">百分制 (0-100)</option><option value="40">4.0 制 (0.0-4.0)</option></select></div>
<div class="grp"><label>综合 GPA</label><div class="rval" id="gpaD">90</div><input type="range" id="gpa" min="0" max="100" value="90" step="1"><div class="rlbl" id="gpaR"><span>0</span><span>50</span><span>100</span></div></div>
<div class="grp"><label>年级</label><select id="grade"><option value="G10">G10</option><option value="G11">G11</option><option value="G12" selected>G12</option></select></div>
<div class="grp"><label>语言考试</label><select id="langType"><option value="ielts">IELTS (0-9)</option><option value="toefl">TOEFL (0-6)</option></select></div>
<div class="grp"><label id="langLbl">语言成绩 (IELTS)</label><div class="rval" id="langD">6.0</div><input type="range" id="lang" min="0" max="9" step="0.5" value="6"><div class="rlbl" id="langR"><span>0</span><span>4.5</span><span>9</span></div></div>
<div class="grp"><label>方向偏好</label><select id="dir"><option value="science">偏理科</option><option value="arts">偏文科</option></select></div>
</div></div>
<div style="flex:1;min-width:280px">
<div class="grp"><label>职业方向（可多选）</label><div style="display:flex;flex-direction:column;gap:2px;margin-top:2px"><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="不确定"> 不确定</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="商科"> 商科(如:金融、会计、市场营销、管理学等)</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="人文社科"> 人文社科(如:经济学、心理学、历史学、社会学等)</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="理科"> 理科(如:数学、物理、化学、生物等)</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="工科"> 工科(如:计算机科学、电子工程、机械工程、土木工程等)</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="医学与健康科学"> 医学与健康科学(如:临床医学、药学、护理学等)</label><label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" class="car-cb" value="艺术设计"> 艺术设计(如:平面设计、服装设计、建筑设计等)</label></div></div>
</div></div></div>
<div class="card"><h3>前置课程与内测</h3><div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div class="pitem" data-target="alg"><input type="checkbox" class="pcb" value="alg"> Algebra 2</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="alg" min="0" max="100" value="85" style="flex:1"><div class="rval" id="algD" style="font-size:16px">85</div></div></div></div><div style="flex:1;min-width:200px"><div class="pitem" data-target="ipc"><input type="checkbox" class="pcb" value="ipc"> IPC</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="ipc" min="0" max="100" value="80" style="flex:1"><div class="rval" id="ipcD" style="font-size:16px">80</div></div></div></div></div>
<div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div class="pitem" data-target="apScore"><input type="checkbox" class="pcb" value="ap1"> AP Physics 1</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="apScore" min="0" max="100" value="85" style="flex:1"><div class="rval" id="apScoreD" style="font-size:16px">85</div></div></div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><select id="apExam" style="flex:1"><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select> <span style="font-size:11px;color:#a0aec0">AP 统考分</span></div></div><div style="flex:1;min-width:200px"><div class="pitem" data-target="his"><input type="checkbox" class="pcb" value="his"> History</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="his" min="0" max="100" value="85" style="flex:1"><div class="rval" id="hisD" style="font-size:16px">85</div></div></div></div></div>
<div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div class="pitem" data-target="geo"><input type="checkbox" class="pcb" value="geo"> Geometry</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="geo" min="0" max="100" value="90" style="flex:1"><div class="rval" id="geoD" style="font-size:16px">90</div></div></div></div><div style="flex:1;min-width:200px"><div class="pitem" data-target="bio"><input type="checkbox" class="pcb" value="bio"> Biology 内测</div><div style="display:flex;align-items:center;gap:4px;margin-top:2px"><div style="display:flex;align-items:center;gap:8px;flex:1"><input type="range" id="bio" min="0" max="100" value="85" style="flex:1"><div class="rval" id="bioD" style="font-size:16px">85</div></div></div></div></div>
</div></div>
<div class="card"><h3>已考 AP 课程</h3><div id="takenList"></div><div style="margin-top:6px"><button class="taken-add" title="添加已考AP课程">+</button></div></div>



<div class="row" style="margin-bottom:20px"><button class="btn" style="width:100%">评估并开始选课</button></div>

<div class="sbar" id="sbar"><div class="cnt">课程 <span id="tc">0</span> | 任选上限 <span id="mx">0</span> 门 | 已选 <span id="sc">0</span> 门 <span id="ch"></span><span class="msg" id="selMsg"></span></div>
<div class="leg"><div class="legi"><span class="ld g"></span> 完全匹配</div><div class="legi"><span class="ld y"></span> 部分匹配</div><div class="legi"><span class="ld r"></span> 不匹配</div></div></div>

<table><thead><tr><th style="width:30px">选</th><th>状态</th><th>AP 课程</th><th>类别</th><th>年级</th><th>语言</th><th>前置/条件</th><th>职业</th></tr></thead><tbody id="tb"></tbody></table>

<div class="card" id="reportCard">
<h3>选课报告</h3>
<div class="row" style="margin-bottom:12px">
<div class="grp" style="flex:2;min-width:250px"><label>发送到邮箱</label><input type="email" id="emailInput" placeholder="输入邮箱" value="dirknight@163.com"></div>
<div class="grp" style="flex:1;min-width:120px"><label>&nbsp;</label><button class="btn-g" style="width:100%">发送报告</button></div></div>
<div class="row" style="gap:8px;margin-top:4px">
<button class="btn2">预览报告</button>
<button class="btn2">下载 PDF</button>
<button class="btn2">打印</button>
</div>
<div class="report-box" id="reportBox"></div></div>
</div>

<script>
var C=[
{id:1,n:'AP Pre-Calculus',c:'理科',l:'初级',la:3,cr:['工科','理科','商科'],pr:{t:'geo',s:90},grade:['G10','G11'],required:true},
{id:2,n:'AP Physics 1',c:'理科',l:'初级',la:3,cr:['工科','医学与健康科学','理科'],pr:{t:'ipc',s:85},grade:['G10','G11']},
{id:3,n:'AP Chemistry',c:'理科',l:'初级',la:4,cr:['医学与健康科学','理科'],pr:{t:'ipc',s:80},grade:['G10','G11','G12']},
{id:4,n:'AP Calculus BC',c:'理科',l:'高级',la:3,cr:['工科','理科','商科'],pr:{t:'alg',s:90},grade:['G11','G12'],required:true},
{id:5,n:'AP Statistics',c:'理科',l:'高级',la:4,cr:['理科','商科'],pr:{t:'alg',s:90},grade:['G12'],required:true},
{id:6,n:'AP Physics 2',c:'理科',l:'高级',la:3,cr:['工科','理科'],pr:{t:'ap1',s:3},grade:['G11','G12']},
{id:7,n:'AP Physics C: Mechanics',c:'理科',l:'高级',la:3,cr:['工科','理科'],pr:{t:'both',algS:90,ap1S:3},grade:['G11','G12']},
{id:8,n:'AP Physics C: E&M',c:'理科',l:'高级',la:3,cr:['工科','理科'],pr:{t:'both',algS:90,ap1S:3},grade:['G11','G12']},
{id:9,n:'AP Biology',c:'理科',l:'高级',la:5,cr:['医学与健康科学','理科'],pr:null,entry:85,grade:['G11','G12']},
{id:10,n:'AP Psychology',c:'社科',l:'',la:6,cr:['医学与健康科学','人文社科'],pr:{t:'ipc',s:95},orReq:true,grade:['G11','G12']},
{id:11,n:'AP Microeconomics',c:'社科',l:'',la:4,cr:['商科','人文社科'],pr:{t:'alg',s:85},grade:['G11','G12']},
{id:12,n:'AP Macroeconomics',c:'社科',l:'',la:4,cr:['商科','人文社科'],pr:null,grade:['G11','G12']},
{id:13,n:'AP Business',c:'社科',l:'',la:4,cr:['商科','人文社科'],pr:null,grade:['G11','G12']},
{id:14,n:'AP World History',c:'社科',l:'',la:6,cr:['人文社科'],pr:{t:'his',s:85},grade:['G11','G12']}
];

var _lastSt=null,_lastResult=null;

function hasPre(v){
  var e=document.querySelector('.pcb[value="'+v+'"]');
  return e&&e.checked;
}

function togglePre(el,ev){
  if(ev.target.type==='checkbox')return;
  var cb=el.querySelector('.pcb');
  cb.checked=!cb.checked;
  el.classList.toggle('chk',cb.checked);
  var t=document.getElementById(el.dataset.target);
  if(t)t.disabled=!cb.checked;
  if(el.dataset.target==="apScore"){var e=document.getElementById("apExam");if(e)e.disabled=!cb.checked}
}

function swLang(){var s=document.getElementById('lang'),v=document.getElementById('langD'),l=document.getElementById('langR'),lb=document.getElementById('langLbl'),t=document.getElementById('langType').value;if(t==='ielts'){s.min=0;s.max=9;s.step=0.5;s.value=6;v.textContent='6.0';l.innerHTML='<span>0</span><span>4.5</span><span>9</span>';lb.textContent='语言成绩 (IELTS 0-9)'}else{s.min=0;s.max=6;s.step=0.5;s.value=4;v.textContent='4';l.innerHTML='<span>0</span><span>3</span><span>6</span>';lb.textContent='语言成绩 (TOEFL 0-6)'}}
function udLang(){document.getElementById('langD').textContent=document.getElementById('lang').value}

function swGpa(){var t=document.getElementById('gpaType').value,s=document.getElementById('gpa'),d=document.getElementById('gpaD'),r=document.getElementById('gpaR');if(t==='40'){var v=Math.round(parseInt(s.value)/100*40);s.min=0;s.max=40;s.step=1;s.value=v;d.textContent=(v/10).toFixed(1);r.innerHTML='<span>0</span><span>2.0</span><span>4.0</span>'}else{var v=Math.round(parseInt(s.value)/40*100);s.min=0;s.max=100;s.step=1;s.value=v;d.textContent=v;r.innerHTML='<span>0</span><span>50</span><span>100</span>'}}

function getCareers(){return Array.from(document.querySelectorAll('.car-cb:checked')).map(function(c){return c.value})}
function getLang(){var r=parseFloat(document.getElementById('lang').value),t=document.getElementById('langType').value;if(t==='toefl'){if(r>=5)return 6;if(r>=4)return 5;if(r>=3)return 4;if(r>=2)return 3;if(r>=1)return 1;return 0}var m={};for(var i=0;i<=9;i+=0.5)m[i]=0;m[0]=0;m[0.5]=0;m[1]=0;m[1.5]=1;m[2]=1;m[2.5]=1;m[3]=2;m[3.5]=2;m[4]=2;m[4.5]=3;m[5]=3;m[5.5]=4;m[6]=5;m[6.5]=6;m[7]=6;m[7.5]=6;m[8]=6;m[8.5]=6;m[9]=6;return m[r]||Math.round(r/1.5)}
function lim(g){if(g>=88)return 3;if(g>=86)return 2;if(g>=84)return 1;return 1}

function addTakenRow(){var list=document.getElementById('takenList');var row=document.createElement('div');row.className='taken-row';var opts=C.map(function(x){return '<option value="'+x.id+'">'+x.n+'</option>'}).join('');row.innerHTML='<select class="taken-sel">'+opts+'</select> <select class="taken-sc"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option></select> <button class="taken-rmv" data-rmv="1">×</button>';list.appendChild(row)}
function getTakenCourses(){return Array.from(document.querySelectorAll('#takenList .taken-row')).map(function(r){var s=r.querySelector('.taken-sel'),c=r.querySelector('.taken-sc');return{id:parseInt(s.value),name:s.options[s.selectedIndex].text,score:parseInt(c.value)}})}
function getTakenMap(taken){var m={};taken.forEach(function(t){m[t.id]=t.score});return m}
function evalPre(x,st,takenMap){
if(!x.pr)return{ok:true,note:''};var p=x.pr;
if(p.t==='alg'){var ok=hasPre('alg')&&st.alg>=p.s;return{ok:ok,note:ok?'通过':(hasPre('alg')?'分数不足':'未修Alg2')}}
