<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP 选课推荐系统 IHP 2026-27</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("_-3OZxsB9b2xnfwAm")</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#1a1a2e}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:36px 20px;border-radius:12px;margin-bottom:24px;text-align:center}
header h1{font-size:24px;margin-bottom:6px}
header p{color:#a8b2d1;font-size:14px}
.card{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h3{font-size:13px;font-weight:700;color:#4a5568;margin-bottom:12px;border-bottom:1px solid #edf2f7;padding-bottom:8px}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.grp{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
.grp label{font-size:10px;font-weight:600;color:#4a5568;text-transform:uppercase;letter-spacing:.3px}
.grp select,.grp input{padding:7px 10px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px}
.grp select:focus,.grp input:focus{outline:none;border-color:#0f3460}
.grp input[type="range"]{padding:0;border:none;height:5px;-webkit-appearance:none;background:#e2e8f0;border-radius:3px}
.grp input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#0f3460;cursor:pointer}
.grp input[type="range"]:disabled,.grp select:disabled{opacity:.3;cursor:not-allowed}
.rval{font-size:22px;font-weight:700;color:#0f3460;text-align:center;line-height:1}
.rlbl{display:flex;justify-content:space-between;font-size:10px;color:#a0aec0}
.pgrid{display:flex;flex-wrap:wrap;gap:8px}
.pitem{display:flex;align-items:center;gap:5px;padding:5px 10px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:12px;user-select:none}
.pitem:hover{border-color:#bee3f8}
.pitem input[type="checkbox"]{width:14px;height:14px;pointer-events:none}
.pitem.chk{border-color:#0f3460;background:#ebf4ff;font-weight:600}
.btn{padding:8px 28px;background:#0f3460;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#1a1a2e}
.btn2{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #0f3460;color:#0f3460;background:#fff}
.btn2:hover{background:#ebf4ff}
.btn-g{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #48bb78;color:#22543d;background:#fff}
.btn-g:hover{background:#c6f6d5}
.sbar{background:#fff;border-radius:12px;padding:12px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:13px}
.sbar .cnt span{color:#0f3460;font-weight:700}
.leg{display:flex;gap:12px;flex-wrap:wrap}
.legi{display:flex;align-items:center;gap:4px;font-size:11px;color:#4a5568}
.ld{width:9px;height:9px;border-radius:50%}.ld.g{background:#48bb78}.ld.y{background:#ecc94b}.ld.r{background:#fc8181}
table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);background:#fff}
thead{background:#1a1a2e;color:#fff}th{padding:10px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
td{padding:10px 8px;font-size:12px;border-bottom:1px solid #edf2f7}tbody tr:hover{background:#f7fafc}
.gh{background:#edf2f7!important;font-weight:700}.gh td{padding:8px;font-size:13px;border-bottom:2px solid #e2e8f0}
.bdg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-right:6px}
.bdg.sc{background:#bee3f8;color:#2a4365}.bdg.ad{background:#fefcbf;color:#744210}.bdg.ar{background:#fbb6ce;color:#702459}.bdg.ss{background:#e9d8fd;color:#44337a}
.sb{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.sb.g{background:#c6f6d5;color:#22543d}.sb.y{background:#fefcbf;color:#744210}.sb.r{background:#fed7d7;color:#9b2c2c}
.tg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:500}
.tg.g{background:#c6f6d5;color:#22543d}.tg.r{background:#fed7d7;color:#9b2c2c}
.ch{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.ch.g{background:#c6f6d5;color:#22543d}.ch.y{background:#fefcbf;color:#744210}.ch.r{background:#fed7d7;color:#9b2c2c}
.cbox{text-align:center}.cbox input{width:14px;height:14px;cursor:pointer}.cbox input:disabled{cursor:not-allowed;opacity:.25}
.ctags{display:flex;flex-wrap:wrap;gap:2px}.ctag{font-size:9px;padding:1px 5px;border-radius:3px;background:#edf2f7;color:#4a5568}
.ctag.ok{background:#c6f6d5;color:#22543d;font-weight:600}
.rtag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#fed7d7;color:#9b2c2c;font-weight:600}
.report-box{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-top:20px;white-space:pre-wrap;font-size:13px;line-height:1.8;display:none}
.report-box.show{display:block}
@media(max-width:768px){.container{padding:12px}.card{padding:14px}.row{gap:10px}.grp{min-width:110px}}
@media print{header,.card,.sbar{break-inside:avoid}.report-box.show{box-shadow:none;padding:0}}
</style>
</head>
<body>
<div class="container">
<header><h1>AP 选课推荐系统 — IHP 2026-27</h1><p>根据 IHP 2026-27 官方选课标准智能评估你的 AP 选课资格</p></header>

<div class="card"><h3>基本信息</h3><div class="row">
<div class="grp"><label>学生姓名</label><input type="text" id="stuName" placeholder="输入姓名"></div>
<div class="grp"><label>综合 GPA</label><div class="rval" id="gpaD">90</div><input type="range" id="gpa" min="0" max="100" value="90" oninput="gpaD.textContent=this.value"><div class="rlbl"><span>0</span><span>50</span><span>100</span></div></div>
<div class="grp"><label>年级</label><select id="grade"><option value="G10">G10</option><option value="G11">G11</option><option value="G12" selected>G12</option></select></div>
<div class="grp"><label>语言考试</label><select id="langType" onchange="swLang()"><option value="ielts">IELTS (0-9)</option><option value="toefl">TOEFL (0-6)</option></select></div>
<div class="grp"><label id="langLbl">语言成绩 (IELTS)</label><div class="rval" id="langD">6.0</div><input type="range" id="lang" min="0" max="9" step="0.5" value="6" oninput="udLang()"><div class="rlbl" id="langR"><span>0</span><span>4.5</span><span>9</span></div></div>
<div class="grp"><label>方向偏好</label><select id="dir"><option value="science">偏理科</option><option value="arts">偏文科</option></select></div>
<div class="grp"><label>职业方向</label><select id="car"><option>不确定</option><option>工程与计算机</option><option>医学与生命科学</option><option>数据科学与金融</option><option>科研与学术</option><option>商业与管理</option><option>法律与公共政策</option><option>心理与教育</option><option>人文与传媒</option></select></div>
</div></div>

<div class="card"><h3>前置课程（未修则不勾选）</h3>
<div class="row"><div class="pgrid">
<div class="pitem" data-target="alg" onclick="togglePre(this,event)"><input type="checkbox" class="pcb" value="alg"> Algebra 2</div>
<div class="pitem" data-target="ipc" onclick="togglePre(this,event)"><input type="checkbox" class="pcb" value="ipc"> IPC</div>
<div class="pitem" data-target="apScore" onclick="togglePre(this,event)"><input type="checkbox" class="pcb" value="ap1"> AP Physics 1 (AP考)</div>
<div class="pitem" data-target="his" onclick="togglePre(this,event)"><input type="checkbox" class="pcb" value="his"> History</div>
</div></div>
<div class="row" style="margin-top:10px">
<div class="grp" style="flex:1;min-width:140px"><label>Algebra 2 成绩</label><div class="rval" id="algD">85</div><input type="range" id="alg" min="0" max="100" value="85" oninput="algD.textContent=this.value"><div class="rlbl"><span>0</span><span>50</span><span>100</span></div></div>
<div class="grp" style="flex:1;min-width:140px"><label>IPC 成绩</label><div class="rval" id="ipcD">80</div><input type="range" id="ipc" min="0" max="100" value="80" oninput="ipcD.textContent=this.value"><div class="rlbl"><span>0</span><span>50</span><span>100</span></div></div>
<div class="grp" style="flex:1;min-width:140px"><label>History 成绩</label><div class="rval" id="hisD">85</div><input type="range" id="his" min="0" max="100" value="85" oninput="hisD.textContent=this.value"><div class="rlbl"><span>0</span><span>50</span><span>100</span></div></div>
<div class="grp" style="flex:1;min-width:100px"><label>AP Physics 1 考分</label><select id="apScore"><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select></div>
</div></div>

<div class="card"><h3>仅 AP Biology：入学内测成绩</h3><div class="row"><div class="grp" style="flex:1;min-width:200px"><label>Biology 内测成绩</label><div class="rval" id="bioD">85</div><input type="range" id="bio" min="0" max="100" value="85" oninput="bioD.textContent=this.value"><div class="rlbl"><span>0</span><span>50</span><span>100</span></div></div></div></div>

<div class="row" style="margin-bottom:20px"><button class="btn" onclick="go()" style="width:100%">评估并开始选课</button></div>

<div class="sbar" id="sbar"><div class="cnt">课程 <span id="tc">0</span> | 任选上限 <span id="mx">0</span> 门 | 已选 <span id="sc">0</span> 门 <span id="ch"></span></div>
<div class="leg"><div class="legi"><span class="ld g"></span> 完全匹配</div><div class="legi"><span class="ld y"></span> 部分匹配</div><div class="legi"><span class="ld r"></span> 不匹配</div></div></div>

<table><thead><tr><th style="width:30px">选</th><th>状态</th><th>AP 课程</th><th>类别</th><th>年级</th><th>语言</th><th>前置/条件</th><th>职业</th></tr></thead><tbody id="tb"></tbody></table>

<div class="card" id="reportCard">
<h3>选课报告</h3>
<div class="row" style="margin-bottom:12px">
<div class="grp" style="flex:2;min-width:250px"><label>发送到邮箱</label><input type="email" id="emailInput" placeholder="输入邮箱" value="dirknight@163.com"></div>
<div class="grp" style="flex:1;min-width:120px"><label>&nbsp;</label><button class="btn-g" onclick="sendReport()" style="width:100%">发送报告</button></div></div>
<div class="row" style="gap:8px;margin-top:4px">
<button class="btn2" onclick="genReport()">预览报告</button>
<button class="btn2" onclick="downloadPDF()">下载 PDF</button>
<button class="btn2" onclick="window.print()">打印</button>
</div>
<div class="report-box" id="reportBox"></div></div>
</div>

<script>
var C=[
{id:1,n:'AP Pre-Calculus',c:'理科',l:'初级',la:3,cr:['工程与计算机','数据科学与金融'],pr:{t:'alg',s:85},grade:['G10','G11'],required:true},
{id:2,n:'AP Physics 1',c:'理科',l:'初级',la:3,cr:['工程与计算机','医学与生命科学'],pr:{t:'ipc',s:85},grade:['G10','G11']},
{id:3,n:'AP Chemistry',c:'理科',l:'初级',la:4,cr:['医学与生命科学','科研与学术'],pr:{t:'ipc',s:80},grade:['G10','G11','G12']},
{id:4,n:'AP Calculus BC',c:'理科',l:'高级',la:3,cr:['工程与计算机','数据科学与金融','科研与学术'],pr:{t:'alg',s:90},grade:['G11','G12'],required:true},
{id:5,n:'AP Statistics',c:'理科',l:'高级',la:4,cr:['数据科学与金融','商业与管理'],pr:{t:'alg',s:90},grade:['G12'],required:true},
{id:6,n:'AP Physics 2',c:'理科',l:'高级',la:3,cr:['工程与计算机','科研与学术'],pr:{t:'ap1',s:3},grade:['G11','G12']},
{id:7,n:'AP Physics C: Mechanics',c:'理科',l:'高级',la:3,cr:['工程与计算机','科研与学术'],pr:{t:'both',algS:90,ap1S:3},grade:['G11','G12']},
{id:8,n:'AP Physics C: E&M',c:'理科',l:'高级',la:3,cr:['工程与计算机','科研与学术'],pr:{t:'both',algS:90,ap1S:3},grade:['G11','G12']},
{id:9,n:'AP Biology',c:'理科',l:'高级',la:5,cr:['医学与生命科学','科研与学术'],pr:null,entry:85,grade:['G11','G12']},
{id:10,n:'AP Psychology',c:'社科',l:'',la:6,cr:['心理与教育','医学与生命科学'],pr:{t:'ipc',s:95},orReq:true,grade:['G11','G12']},
{id:11,n:'AP Microeconomics',c:'社科',l:'',la:4,cr:['商业与管理','数据科学与金融'],pr:{t:'alg',s:85},grade:['G11','G12']},
{id:12,n:'AP Macroeconomics',c:'社科',l:'',la:4,cr:['商业与管理','数据科学与金融'],pr:null,grade:['G11','G12']},
{id:13,n:'AP Business',c:'社科',l:'',la:4,cr:['商业与管理','数据科学与金融'],pr:null,grade:['G11','G12']},
{id:14,n:'AP World History',c:'社科',l:'',la:6,cr:['法律与公共政策','人文与传媒'],pr:{t:'his',s:85},grade:['G11','G12']}
];

var _lastSt=null,_lastResult=null;

function hasPre(v){
  var e=document.querySelector('.pcb[value="'+v+'"]');
  return e&&e.checked;
}

function togglePre(el,ev){
  if(ev.target.type==='checkbox')return;
  var cb=el.querySelector('.pcb');
  cb.checked=!cb.checked;
  el.classList.toggle('chk',cb.checked);
  var t=document.getElementById(el.dataset.target);
  if(t)t.disabled=!cb.checked;
}

function swLang(){var s=document.getElementById('lang'),v=document.getElementById('langD'),l=document.getElementById('langR'),lb=document.getElementById('langLbl'),t=document.getElementById('langType').value;if(t==='ielts'){s.min=0;s.max=9;s.step=0.5;s.value=6;v.textContent='6.0';l.innerHTML='<span>0</span><span>4.5</span><span>9</span>';lb.textContent='语言成绩 (IELTS 0-9)'}else{s.min=0;s.max=6;s.step=0.5;s.value=4;v.textContent='4';l.innerHTML='<span>0</span><span>3</span><span>6</span>';lb.textContent='语言成绩 (TOEFL 0-6)'}}
function udLang(){document.getElementById('langD').textContent=document.getElementById('lang').value}
function getLang(){var r=parseFloat(document.getElementById('lang').value),t=document.getElementById('langType').value;if(t==='toefl')return r;var m={};for(var i=0;i<=9;i+=0.5)m[i]=0;m[0]=0;m[0.5]=0;m[1]=0;m[1.5]=1;m[2]=1;m[2.5]=1;m[3]=2;m[3.5]=2;m[4]=2;m[4.5]=3;m[5]=3;m[5.5]=4;m[6]=5;m[6.5]=6;m[7]=6;m[7.5]=6;m[8]=6;m[8.5]=6;m[9]=6;return m[r]||Math.round(r/1.5)}
function lim(g){if(g>=92)return 3;if(g>=88)return 2;if(g>=85)return 1;return 1}

function evalPre(x,st){
if(!x.pr)return{ok:true,note:''};var p=x.pr;
if(p.t==='alg'){var ok=hasPre('alg')&&st.alg>=p.s;return{ok:ok,note:ok?'通过':(hasPre('alg')?'分数不足':'未修Alg2')}}
if(p.t==='ipc'){var ok=hasPre('ipc')&&st.ipc>=p.s;return{ok:ok,note:ok?'通过':(hasPre('ipc')?'分数不足':'未修IPC')}}
if(p.t==='his'){var ok=hasPre('his')&&st.his>=p.s;return{ok:ok,note:ok?'通过':(hasPre('his')?'分数不足':'未修His')}}
if(p.t==='ap1'){var ok=hasPre('ap1')&&st.ap>=p.s;return{ok:ok,note:ok?'通过':(hasPre('ap1')?'AP分不足':'未考AP Ph1')}}
if(p.t==='both'){var ok=hasPre('alg')&&st.alg>=p.algS&&hasPre('ap1')&&st.ap>=p.ap1S;return{ok:ok,note:ok?'通过':'需Alg2 90+ & AP Ph1 3+'}}
return{ok:true,note:''};
}

function go(){
var st={g:parseInt(document.getElementById('gpa').value),gr:document.getElementById('grade').value,la:getLang(),d:document.getElementById('dir').value,c:document.getElementById('car').value,alg:parseInt(document.getElementById('alg').value),ipc:parseInt(document.getElementById('ipc').value),his:parseInt(document.getElementById('his').value),ap:parseInt(document.getElementById('apScore').value),bio:parseInt(document.getElementById('bio').value)};
var mx=lim(st.g);document.getElementById('mx').textContent=mx;
document.getElementById('ch').innerHTML=' <span class="ch '+(st.g>=92?'g':st.g>=88?'y':'r')+'">GPA'+st.g+',可选'+mx+'门</span>';
document.querySelectorAll('.ck').forEach(function(c){c.checked=false});document.getElementById('sc').textContent='0';
var f=C.filter(function(x){if(st.d==='science')return x.c==='理科'||x.c==='社科';if(st.d==='arts')return x.c==='文科'||x.c==='社科';return true});
f=f.filter(function(x){return x.grade.indexOf(st.gr)!==-1});
var m=0,p=0,n=0,tb=document.getElementById('tb');tb.innerHTML='';var gs=[];
var p1=f.filter(function(x){return x.c==='理科'&&x.l==='初级'}),p2=f.filter(function(x){return x.c==='理科'&&x.l==='高级'}),p3=f.filter(function(x){return x.c==='文科'}),p4=f.filter(function(x){return x.c==='社科'});
if(p1.length)gs.push({l:'理科.初级',s:'sc',cs:p1});if(p2.length)gs.push({l:'理科.高级',s:'ad',cs:p2});if(p3.length)gs.push({l:'文科',s:'ar',cs:p3});if(p4.length)gs.push({l:'社会科学',s:'ss',cs:p4});
document.getElementById('tc').textContent=f.length;
gs.forEach(function(g){
var hd=document.createElement('tr');hd.className='gh';hd.innerHTML='<td colspan="8"><span class="bdg '+g.s+'">'+g.l+'</span>('+g.cs.length+'门)</td>';tb.appendChild(hd);
g.cs.forEach(function(x){
var lOk=st.la>=x.la,pre=evalPre(x,st),cOk=x.required||st.c==='不确定'||x.cr.indexOf(st.c)!==-1;
var all=[];if(x.orReq){all.push(lOk||pre.ok);all.push(cOk)}else{all.push(lOk);all.push(pre.ok);all.push(cOk)}if(x.entry)all.push(st.bio>=x.entry);
var met=all.filter(Boolean).length,total=all.length,ss,sl;
if(met===total){ss='g';sl='完全匹配';m++}else if(met>=Math.ceil(total/2)){ss='y';sl='部分匹配';p++}else{ss='r';sl='不匹配';n++}
var ct=x.cr.map(function(cr){return '<span class="ctag'+(cr===st.c?' ok':'')+'">'+cr+'</span>'}).join('');
var cd=x.c+(x.l?' . '+x.l:''),rt=x.required?' <span class="rtag">必修</span>':'';
var tr=document.createElement('tr');
tr.innerHTML='<td class="cbox"><input type="checkbox" class="ck"'+(met===total?'':' disabled')+'></td><td><span class="sb '+ss+'">'+sl+'</span></td><td><strong>'+x.n+'</strong>'+rt+'</td><td><span style="font-size:11px;color:#718096">'+cd+'</span></td><td>'+x.grade.join('/')+'</td><td><span class="tg '+(lOk?'g':'r')+'">'+(document.getElementById('langType').value==='ielts'?'IELTS'+x.la+'级':'TOEFL'+x.la+'级')+'</span></td><td>'+(pre.ok?'<span class="tg g">'+pre.note+'</span>':'<span class="tg r">'+pre.note+'</span>')+'</td><td><div class="ctags">'+ct+'</div></td>';
tb.appendChild(tr);});});
_lastSt=st;_lastResult={f:f,m:m,p:p,n:n,st:st};
var sb=document.getElementById('sbar'),dt=sb.querySelector('.dt');if(!dt){dt=document.createElement('span');dt.className='dt';sb.querySelector('.cnt').after(dt)}
dt.innerHTML='<span style="color:#22543d;font-weight:600">完全匹配 '+m+'</span><span style="margin:0 5px;color:#a0aec0">|</span><span style="color:#744210;font-weight:600">部分匹配 '+p+'</span><span style="margin:0 5px;color:#a0aec0">|</span><span style="color:#9b2c2c;font-weight:600">不匹配 '+n+'</span><span style="margin:0 5px;color:#a0aec0">|</span><span style="color:#0f3460;font-weight:600">已选 <span id="sc2">0</span></span>';
}

document.addEventListener('change',function(e){if(e.target.classList.contains('ck')){var mx=parseInt(document.getElementById('mx').textContent);var ck=document.querySelectorAll('.ck:checked');if(ck.length>mx){e.target.checked=false;alert('GPA '+document.getElementById('gpa').value+' 分, 最多只能选 '+mx+' 门课')}var sl=Math.min(ck.length,mx);document.getElementById('sc').textContent=sl;var e2=document.getElementById('sc2');if(e2)e2.textContent=sl}});

function buildReport(){
if(!_lastResult)return '请先点击「评估并开始选课」生成结果。';
var st=_lastSt,r=_lastResult,lt=document.getElementById('langType'),nm=document.getElementById('stuName').value||'(未填)';
var s='========================================\n  AP 课程选课报告 — IHP 2026-27\n========================================\n\n【基本信息】\n  姓名：'+nm+'\n  综合 GPA：'+st.g+' 分\n  年级：'+st.gr+'\n  语言：'+(lt.value==='ielts'?'IELTS':'TOEFL')+' '+document.getElementById('langD').textContent+'\n  方向：'+(st.d==='science'?'偏理科':'偏文科')+'\n  职业：'+st.c+'\n\n【前置课程】\n  Alg2：'+(hasPre('alg')?'已修 '+st.alg+'分':'未修')+' | IPC：'+(hasPre('ipc')?'已修 '+st.ipc+'分':'未修')+' | AP Ph1：'+(hasPre('ap1')?'已考 '+st.ap+'分':'未考')+' | His：'+(hasPre('his')?'已修 '+st.his+'分':'未修')+'\n\n【评估结果】  可任选 '+document.getElementById('mx').textContent+' 门 | 完全匹配：'+r.m+' | 部分匹配：'+r.p+' | 不匹配：'+r.n+'\n\n【推荐与备选课程】\n';
r.f.forEach(function(x){var pre=evalPre(x,st),lOk=st.la>=x.la,cOk=x.required||st.c==='不确定'||x.cr.indexOf(st.c)!==-1;var dims=[];if(x.orReq){dims.push({k:'语言/前置',v:lOk||pre.ok})}else{dims.push({k:'语言',v:lOk});dims.push({k:'前置',v:pre.ok});dims.push({k:'职业',v:cOk})}if(x.entry)dims.push({k:'内测',v:st.bio>=x.entry});var met=dims.filter(function(d){return d.v}).length,total=dims.length;if(met===total){s+='  \u2705 '+(x.required?'[必修]':'[推荐]')+' '+x.n+' ('+x.c+(x.l?' . '+x.l:'')+') '+x.grade.join('/')+' '+(lt.value==='ielts'?'IELTS'+x.la+'级':'TOEFL'+x.la+'级')+'\n'}else if(met>=Math.ceil(total/2)){var fail=dims.filter(function(d){return !d.v}).map(function(d){return d.k}).join(',');s+='  \u26a0\ufe0f [部分匹配] '+x.n+' - 缺:'+fail+' ('+x.c+(x.l?' . '+x.l:'')+') '+x.grade.join('/')+'\n'}});
s+='\n生成时间：'+new Date().toLocaleString('zh-CN')+'\n';
return s;
}

function genReport(){var box=document.getElementById('reportBox');box.textContent=buildReport();box.classList.add('show')}

function generatePDF(){
try{var text=buildReport(),{jsPDF}=window.jspdf,doc=new jsPDF();doc.setFontSize(10);var lines=doc.splitTextToSize(text,180);doc.text(lines,15,15);return doc.output('datauristring')}catch(e){return null}
}

function downloadPDF(){
var uri=generatePDF();
if(uri){var link=document.createElement('a');link.href=uri;link.download='AP选课报告.pdf';link.click()}
else{alert('PDF生成失败，请使用「打印」按钮 → 目标选「另存为PDF」');}
}

function sendReport(){
var email=document.getElementById('emailInput').value.trim();
if(!email||!email.includes('@')){alert('请输入有效的邮箱地址');return}
var text=buildReport(),btn=document.querySelector('.btn-g');btn.textContent='发送中...';btn.disabled=true;
if(typeof emailjs!=='undefined'&&typeof window.jspdf!=='undefined'){
var pdfUri=generatePDF();
if(pdfUri){
var base64=pdfUri.split(',')[1];
emailjs.send('service_4cpq62q','template_k7v4zpw',{to_email:email,reportContent:'PDF报告见附件',subject:'AP 选课报告 IHP 2026-27',attachment:[{name:'AP选课报告.pdf',data:base64,type:'application/pdf'}]}).then(function(){alert('PDF报告已发送到 '+email+' ！');btn.textContent='发送报告';btn.disabled=false},function(e){alert('发送失败: '+e.text);btn.textContent='发送报告';btn.disabled=false});
return;
}else{
alert('PDF生成失败,改用正文发送');
emailjs.send('service_4cpq62q','template_k7v4zpw',{to_email:email,reportContent:text,subject:'AP 选课报告 IHP 2026-27'}).then(function(){alert('报告已发送到 '+email+' ！');btn.textContent='发送报告';btn.disabled=false},function(e){alert('发送失败: '+e.text);btn.textContent='发送报告';btn.disabled=false});
return;
}
}
var body=encodeURIComponent(text);window.open('mailto:'+email+'?subject='+encodeURIComponent('AP 选课报告 IHP 2026-27')+'&body='+body,'_blank');btn.textContent='发送报告';btn.disabled=false;
}

document.querySelectorAll('.pitem[data-target]').forEach(function(el){var t=document.getElementById(el.dataset.target);if(t)t.disabled=true});
go();
</script>
